<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy">
  <title>AI Usage Advisor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     var(--vscode-editor-background,            #ffffff);
      --bg2:    var(--vscode-sideBar-background,           #f5f5f3);
      --bg3:    var(--vscode-editorGroupHeader-tabsBackground, #eeede8);
      --text:   var(--vscode-editor-foreground,            #1a1a18);
      --text2:  var(--vscode-descriptionForeground,        #6b6b67);
      --text3:  var(--vscode-disabledForeground,           #9b9b97);
      --border: var(--vscode-widget-border,                rgba(0,0,0,0.12));
      --border2: rgba(0,0,0,0.22);
      --radius: 10px; --radius-sm: 7px;
      --peak:   #E24B4A; --peak-bg: #FCEBEB; --peak-border: #F7C1C1; --peak-text: #791F1F;
      --off:    #639922; --off-bg:  #EAF3DE; --off-border:  #C0DD97; --off-text:  #27500A;
      --turbo:  #7F77DD; --turbo-bg:#EEEDFE; --turbo-border:#CECBF6; --turbo-text:#3C3489;
      --anthropic: #D97706; --openai: #10A37F;
    }

    body {
      font-family: var(--vscode-font-family, 'IBM Plex Sans', system-ui, sans-serif);
      font-size: 13px;
      background: var(--bg3);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 1.5rem 1rem;
    }
    .app { width: 100%; max-width: 400px; }

    /* ── Header ── */
    .app-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
    .app-header-icon { width: 34px; height: 34px; background: var(--text); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
    .app-title { font-size: 14px; font-weight: 600; }
    .app-sub   { font-size: 11px; color: var(--text3); margin-top: 1px; }

    /* ── Section label ── */
    .section-label { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }

    /* ── Provider toggle ── */
    .provider-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 1.25rem; }
    .provider-btn {
      padding: 8px 10px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg);
      cursor: pointer; text-align: center; transition: all .15s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .provider-btn:hover { border-color: var(--border2); }
    .provider-btn.active.anthropic { border-color: var(--anthropic); border-width: 2px; }
    .provider-btn.active.openai   { border-color: var(--openai);    border-width: 2px; }
    .provider-logo { font-size: 16px; }
    .provider-name { font-size: 12px; font-weight: 600; }
    .provider-btn.active.anthropic .provider-name { color: var(--anthropic); }
    .provider-btn.active.openai   .provider-name { color: var(--openai); }

    /* ── Plan tabs ── */
    .plan-tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .plan-tab {
      flex: 1; min-width: 70px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 8px 5px;
      cursor: pointer; text-align: center; transition: all .15s;
    }
    .plan-tab:hover { border-color: var(--border2); }
    .plan-tab.active { border-width: 2px; }
    .plan-tab.active.anthropic { border-color: var(--anthropic); }
    .plan-tab.active.openai   { border-color: var(--openai); }
    .pt-name  { font-size: 11px; font-weight: 600; color: var(--text); }
    .pt-price { font-size: 10px; color: var(--text3); margin-top: 1px; }
    .pt-badge { font-size: 9px; font-weight: 500; padding: 2px 5px; border-radius: 8px; display: inline-block; margin-top: 3px; }
    .anthropic .pt-badge { background: #fef3c7; color: #92400e; }
    .openai    .pt-badge { background: #d1fae5; color: #065f46; }

    /* ── Banner ── */
    .banner { border-radius: var(--radius); padding: 1.1rem 1.25rem; margin-bottom: 1.25rem; border: 1px solid var(--border); transition: background .3s, border-color .3s; }
    .banner.peak    { background: var(--peak-bg);  border-color: var(--peak-border); }
    .banner.offpeak { background: var(--off-bg);   border-color: var(--off-border);  }
    .banner.turbo   { background: var(--turbo-bg); border-color: var(--turbo-border);}
    .b-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
    .b-clock { font-family: 'IBM Plex Mono', monospace; font-size: 28px; font-weight: 600; color: var(--text); letter-spacing: -1px; line-height: 1; }
    .b-day  { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }
    .b-tz   { font-size: 9px; color: var(--text3); margin-top: 2px; }
    .b-status { text-align: right; }
    .b-dot-row { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
    .b-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 2s infinite; }
    .b-dot.peak    { background: var(--peak); }
    .b-dot.offpeak { background: var(--off);  }
    .b-dot.turbo   { background: var(--turbo);}
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }
    .b-label { font-size: 12px; font-weight: 600; }
    .b-label.peak    { color: var(--peak-text);  }
    .b-label.offpeak { color: var(--off-text);   }
    .b-label.turbo   { color: var(--turbo-text); }
    .b-countdown { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 8px; display: inline-block; margin-top: 5px; }
    .peak    .b-countdown { color: var(--peak-text);  background: var(--peak-border);  }
    .offpeak .b-countdown { color: var(--off-text);   background: var(--off-border);   }
    .turbo   .b-countdown { color: var(--turbo-text); background: var(--turbo-border); }
    .b-msg { font-size: 12px; line-height: 1.55; border-top: 1px solid var(--border); padding-top: 10px; }
    .b-msg.peak    { color: var(--peak-text);  }
    .b-msg.offpeak { color: var(--off-text);   }
    .b-msg.turbo   { color: var(--turbo-text); }

    /* ── Tracker ── */
    .tracker { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem; margin-bottom: 1.25rem; }
    .tracker-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .tracker-reset { font-size: 11px; color: var(--text2); cursor: pointer; padding: 3px 8px; border: 1px solid var(--border); border-radius: 6px; background: transparent; }
    .tracker-reset:hover { background: var(--bg2); color: var(--text); }
    .tracker-main { display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px; }
    .tracker-count { font-family: 'IBM Plex Mono', monospace; font-size: 32px; font-weight: 600; color: var(--text); line-height: 1; }
    .tracker-of    { font-size: 12px; color: var(--text2); }
    .bar-wrap { background: var(--bg3); border-radius: 4px; height: 5px; overflow: hidden; margin-bottom: 8px; }
    .bar { height: 100%; border-radius: 4px; transition: width .4s ease, background .3s; }
    .bar.safe   { background: #639922; }
    .bar.warn   { background: #BA7517; }
    .bar.danger { background: #E24B4A; }
    .tracker-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); margin-bottom: 12px; }
    .tracker-btns { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 6px; }
    .btn { padding: 7px 4px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--bg2); font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text); transition: all .15s; font-family: inherit; }
    .btn:hover { background: var(--bg3); }
    .btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn.primary:hover { opacity: .85; }
    .tracker-window { font-size: 11px; color: var(--text3); text-align: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }

    /* ── Tips ── */
    .tips { background: var(--bg2); border-radius: var(--radius); padding: .9rem 1.1rem; margin-bottom: 1rem; }
    .tip { display: flex; gap: 10px; font-size: 12px; color: var(--text); margin-bottom: 6px; line-height: 1.45; }
    .tip:last-child { margin-bottom: 0; }
    .tip-icon { font-size: 13px; width: 18px; flex-shrink: 0; }

    /* ── Footer ── */
    .footer { font-size: 10px; color: var(--text3); line-height: 1.7; text-align: center; }
    a { color: inherit; }
  </style>
</head>
<body>
<div class="app">

  <div class="app-header">
    <div class="app-header-icon">🧠</div>
    <div>
      <div class="app-title">AI Usage Advisor</div>
      <div class="app-sub" id="app-sub">Loading...</div>
    </div>
  </div>

  <!-- Provider selector -->
  <div class="section-label">AI Provider</div>
  <div class="provider-toggle">
    <div class="provider-btn anthropic active" id="prov-anthropic" onclick="setProvider('anthropic')">
      <span class="provider-logo">🟠</span>
      <span class="provider-name">Anthropic</span>
    </div>
    <div class="provider-btn openai" id="prov-openai" onclick="setProvider('openai')">
      <span class="provider-logo">🟢</span>
      <span class="provider-name">OpenAI</span>
    </div>
  </div>

  <!-- Plan tabs (rendered dynamically) -->
  <div class="section-label">Your plan</div>
  <div class="plan-tabs" id="plan-tabs"></div>

  <!-- Peak banner -->
  <div class="banner" id="banner">
    <div class="b-top">
      <div>
        <div class="b-clock" id="b-clock">--:--:--</div>
        <div class="b-day"   id="b-day"></div>
        <div class="b-tz"    id="b-tz"></div>
      </div>
      <div class="b-status">
        <div class="b-dot-row"><div class="b-dot" id="b-dot"></div><span class="b-label" id="b-label"></span></div>
        <div class="b-countdown" id="b-countdown"></div>
      </div>
    </div>
    <p class="b-msg" id="b-msg"></p>
  </div>

  <!-- Session tracker -->
  <div class="tracker">
    <div class="tracker-header">
      <div class="section-label" style="margin:0">Session tracker</div>
      <button class="tracker-reset" onclick="resetTracker()">Reset window</button>
    </div>
    <div class="tracker-main">
      <div class="tracker-count" id="t-count">0</div>
      <div class="tracker-of"    id="t-of">/ 45 msgs</div>
    </div>
    <div class="bar-wrap"><div class="bar safe" id="t-bar" style="width:0%"></div></div>
    <div class="tracker-meta">
      <span id="t-rem">45 remaining</span>
      <span id="t-pct">0% used</span>
    </div>
    <div class="tracker-btns">
      <button class="btn" onclick="addMsgs(-1)">− 1</button>
      <button class="btn primary" onclick="addMsgs(1)">+ 1 message sent</button>
      <button class="btn" onclick="addMsgs(5)">+ 5</button>
    </div>
    <div class="tracker-window">Window started at <span id="t-started">--:--</span> · <span id="t-plan-name">Pro</span></div>
  </div>

  <!-- Tips -->
  <div class="tips">
    <div class="section-label" id="tips-title">Tips</div>
    <div id="tips-list"></div>
  </div>

  <p class="footer" id="footer-note">
    Peak hours based on US Pacific Time (provider servers).<br>
    Data is session-only and stored locally.
  </p>
</div>

<script nonce="{{nonce}}">
const vscode = acquireVsCodeApi();

// ── Provider / plan data (mirrors advisor.ts) ──────────────────────────────
const PLANS = {
  anthropic: [
    { id: 'free',  name: 'Claude Free',   price: '$0/mo',   limit: 40,  window: 'day',     badge: '~40/day'   },
    { id: 'pro',   name: 'Claude Pro',    price: '$20/mo',  limit: 45,  window: '5 hours', badge: '~45/5h'    },
    { id: 'max5',  name: 'Max 5×',        price: '$100/mo', limit: 225, window: '5 hours', badge: '~225/5h'   },
    { id: 'max20', name: 'Max 20×',       price: '$200/mo', limit: 900, window: '5 hours', badge: '~900/5h'   },
  ],
  openai: [
    { id: 'free',  name: 'ChatGPT Free',  price: '$0/mo',   limit: 15,  window: '3 hours', badge: '~15/3h'    },
    { id: 'plus',  name: 'ChatGPT Plus',  price: '$20/mo',  limit: 40,  window: '3 hours', badge: '~40/3h'    },
    { id: 'team',  name: 'ChatGPT Team',  price: '$30/mo',  limit: 100, window: '3 hours', badge: '~100/3h'   },
    { id: 'pro',   name: 'ChatGPT Pro',   price: '$200/mo', limit: 999, window: 'unlimited',badge: 'Unlimited' },
    { id: 'codex', name: 'Codex API',     price: 'pay-go',  limit: 500, window: 'minute',  badge: '500 RPM'   },
  ],
};

// Peak windows in PT (hours) — provider servers are in the US
const PROVIDER_PEAK = {
  anthropic: { startH: 5,  endH: 11 },
  openai:    { startH: 8,  endH: 18 },
};

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

var provider = 'anthropic';
var planId   = 'pro';
var msgs     = 0;
var windowStart = new Date();
var userTZ   = Intl.DateTimeFormat().resolvedOptions().timeZone;

// ── Time helpers ──────────────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2,'0'); }

function getTimeIn(tz) {
  return new Date(new Date().toLocaleString('en-US', { timeZone: tz }));
}

function getPTTime()    { return getTimeIn('America/Los_Angeles'); }
function getLocalTime() { return getTimeIn(userTZ); }

function minutesUntil(t, th, tm) {
  var cur = t.getHours()*60 + t.getMinutes();
  var diff = th*60+tm - cur;
  if (diff <= 0) diff += 1440;
  return diff;
}

function fmtDiff(m) {
  return m < 60 ? m+' min' : Math.floor(m/60)+'h '+pad(m%60)+'min';
}

function getPeakState() {
  var pt = getPTTime();
  var pk = PROVIDER_PEAK[provider];
  var day = pt.getDay();
  var mins = pt.getHours()*60 + pt.getMinutes();
  if (day===0 || day===6 || pt.getHours()<6) return 'turbo';
  if (mins >= pk.startH*60 && mins < pk.endH*60) return 'peak';
  return 'offpeak';
}

function getPeakLabel(state) {
  return { peak:'Peak hours', offpeak:'Off-peak', turbo:'Turbo mode' }[state];
}

function getPeakMsg(state) {
  var p = provider === 'anthropic' ? 'Claude' : 'ChatGPT/Codex';
  if (state==='peak')    return 'Your '+p+' quota runs FASTER right now. Use complete prompts — no short follow-ups!';
  if (state==='offpeak') return 'Quota at normal rate. Go for it — the window is on your side!';
  return 'Late night or weekend! No extra restrictions. Best time for intensive sessions.';
}

function getCountdown(state) {
  var pt = getPTTime();
  var pk = PROVIDER_PEAK[provider];
  if (state==='peak')    return 'Peak ends in '+fmtDiff(minutesUntil(pt, pk.endH, 0))+' (PT)';
  if (state==='offpeak') {
    var mins = pt.getHours()*60+pt.getMinutes();
    return mins < pk.startH*60
      ? 'Peak starts in '+fmtDiff(minutesUntil(pt, pk.startH, 0))+' (PT)'
      : 'Next peak: tomorrow '+pad(pk.startH)+':00 PT';
  }
  var d = pt.getDay();
  return d===0?'No peak today — Sunday':d===6?'No peak today — Saturday':'Peak starts in '+fmtDiff(minutesUntil(pt, pk.startH, 0))+' (PT)';
}

function getTips(state) {
  var p = provider === 'anthropic';
  var tips = {
    peak: [
      ['⚡','Open a new chat for each topic (less history = fewer tokens)'],
      ['📝','Batch everything into ONE message instead of going back and forth'],
      ['🤖', p ? 'Use Sonnet for daily work (Opus costs 3–5× more quota)' : 'Use GPT-4o-mini for light tasks (GPT-4o uses more quota)'],
      ['⏰','Save heavy sessions for off-peak hours'],
    ],
    offpeak: [
      ['🚀','Great moment for projects with large files or long code'],
      ['💎', p ? 'You can use Opus without burning quota as fast' : 'Good time for GPT-4o with extended context'],
      ['📂','Ideal for uploading large context and organizing projects'],
    ],
    turbo: [
      ['🌙','Ideal for long sessions, evals, or large projects'],
      ['💎', p ? 'Use Opus freely — best time for it' : 'Use GPT-4o freely — no peak throttling'],
      ['⚡','Window runs without the peak multiplier'],
    ],
  };
  return tips[state];
}

function getTipsTitle(state) {
  return { peak:'Tips for peak hours', offpeak:'Best time to work', turbo:'Make the most of turbo mode' }[state];
}

// ── Render ────────────────────────────────────────────────────────────────
function getActivePlan() {
  return PLANS[provider].find(function(p){ return p.id===planId; }) || PLANS[provider][0];
}

function renderPlanTabs() {
  var container = document.getElementById('plan-tabs');
  if (!container) return;
  container.innerHTML = PLANS[provider].map(function(p) {
    var active = p.id===planId ? 'active '+provider : '';
    return '<div class="plan-tab '+provider+' '+active+'" onclick="setPlan(\''+p.id+'\')">'
         + '<div class="pt-name">'+p.name+'</div>'
         + '<div class="pt-price">'+p.price+'</div>'
         + '<div class="pt-badge">'+p.badge+'</div>'
         + '</div>';
  }).join('');
}

function renderTracker() {
  var plan = getActivePlan();
  var lim  = plan.limit;
  var pct  = Math.round((msgs/lim)*100);
  var rem  = lim - msgs;
  setText('t-count', msgs);
  setText('t-of',    '/ '+lim+' msgs');
  setText('t-rem',   rem+' remaining');
  setText('t-pct',   pct+'% used');
  setText('t-plan-name', plan.name);
  var bar = document.getElementById('t-bar');
  if (bar) { bar.style.width=pct+'%'; bar.className='bar '+(pct<60?'safe':pct<85?'warn':'danger'); }
  var ws = windowStart;
  setText('t-started', pad(ws.getHours())+':'+pad(ws.getMinutes()));
}

function renderBanner() {
  var t     = getLocalTime();
  var state = getPeakState();
  setText('b-clock', pad(t.getHours())+':'+pad(t.getMinutes())+':'+pad(t.getSeconds()));
  setText('b-day',   DAYS[t.getDay()]);
  setText('b-tz',    userTZ);
  var banner = document.getElementById('banner');
  if (banner) banner.className = 'banner '+state;
  var dot = document.getElementById('b-dot');
  if (dot) dot.className = 'b-dot '+state;
  var label = document.getElementById('b-label');
  if (label) { label.className='b-label '+state; label.textContent=getPeakLabel(state); }
  setText('b-countdown', getCountdown(state));
  var msgEl = document.getElementById('b-msg');
  if (msgEl) { msgEl.className='b-msg '+state; msgEl.textContent=getPeakMsg(state); }
  setText('tips-title', getTipsTitle(state));
  var tipsList = document.getElementById('tips-list');
  if (tipsList) {
    tipsList.innerHTML = getTips(state).map(function(tip){
      return '<div class="tip"><span class="tip-icon">'+tip[0]+'</span><span>'+tip[1]+'</span></div>';
    }).join('');
  }
}

function renderHeader() {
  var provName = provider==='anthropic' ? 'Anthropic · Claude' : 'OpenAI · ChatGPT / Codex';
  setText('app-sub', provName+' · '+userTZ);
}

function setText(id, v) { var e=document.getElementById(id); if(e) e.textContent=v; }

// ── Actions ───────────────────────────────────────────────────────────────
function setProvider(p) {
  provider = p;
  planId   = p==='anthropic' ? 'pro' : 'plus';
  ['anthropic','openai'].forEach(function(x){
    var el = document.getElementById('prov-'+x);
    if (el) { el.className='provider-btn '+x+(x===p?' active':''); }
  });
  renderHeader();
  renderPlanTabs();
  renderBanner();
  renderTracker();
  vscode.postMessage({ command: 'setProvider', value: p });
  vscode.postMessage({ command: 'setPlan',     value: planId });
}

function setPlan(p) {
  planId = p;
  renderPlanTabs();
  renderTracker();
  vscode.postMessage({ command: 'setPlan', value: p });
}

function addMsgs(n) {
  vscode.postMessage({ command: 'addMsgs', value: n });
}

function resetTracker() {
  vscode.postMessage({ command: 'reset' });
}

// ── Messages from extension host ──────────────────────────────────────────
window.addEventListener('message', function(event) {
  var message = event.data;
  if (message.command === 'update') {
    var s = message.state;
    msgs        = s.msgs;
    provider    = s.provider || provider;
    planId      = s.planId   || planId;
    windowStart = new Date(s.windowStart);
    ['anthropic','openai'].forEach(function(x){
      var el = document.getElementById('prov-'+x);
      if (el) el.className = 'provider-btn '+x+(x===provider?' active':'');
    });
    renderHeader();
    renderPlanTabs();
    renderTracker();
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────
renderHeader();
renderPlanTabs();
renderBanner();
renderTracker();
setInterval(renderBanner, 1000);
</script>
</body>
</html>
